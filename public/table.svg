<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- dégradé doré -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- ombre -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6"
        flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- sol -->
  <ellipse cx="256" cy="390" rx="160" ry="18"
    fill="rgba(0,0,0,0.05)"/>

  <!-- TABLE -->
  <g filter="url(#shadow)">

    <!-- plateau -->
    <rect x="160" y="200"
      width="192"
      height="16"
      rx="6"
      fill="url(#gold)"/>

    <!-- pied central -->
    <rect x="250" y="216"
      width="12"
      height="110"
      rx="6"
      fill="url(#gold)"/>

  </g>

  <!-- CHAISE GAUCHE -->
  <g filter="url(#shadow)">

    <!-- montant gauche -->
    <rect x="120" y="220"
      width="12"
      height="182"
      rx="6"
      fill="url(#gold)"/>

    <!-- montant droit -->
    <rect x="178" y="320"
      width="12"
      height="82"
      rx="6"
      fill="url(#gold)"/>

    <!-- barre centrale -->
    <rect x="120" y="320"
      width="70"
      height="12"
      rx="6"
      fill="url(#gold)"/>

    <!-- support pieds -->
    <rect x="132" y="360"
      width="46"
      height="6"
      rx="3"
      fill="#b8860b"/>

  </g>

  <!-- CHAISE DROITE -->
  <g filter="url(#shadow)">

    <!-- montant gauche -->
    <rect x="322" y="320"
      width="12"
      height="82"
      rx="6"
      fill="url(#gold)"/>

    <!-- montant droit -->
    <rect x="380" y="220"
      width="12"
      height="182"
      rx="6"
      fill="url(#gold)"/>

    <!-- barre centrale -->
    <rect x="322" y="320"
      width="70"
      height="12"
      rx="6"
      fill="url(#gold)"/>

    <!-- support pieds -->
    <rect x="334" y="360"
      width="46"
      height="6"
      rx="3"
      fill="#b8860b"/>

  </g>

</svg>